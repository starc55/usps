<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Load Watcher</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 300px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      background: #111827;
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .status {
      font-size: 13px;
      color: #94a3b8;
    }
    .switch {
      position: relative;
      width: 56px;
      height: 30px;
      background: #334155;
      border-radius: 999px;
      cursor: pointer;
    }
    .switch.active {
      background: #22c55e;
    }
    .dot {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }
    .switch.active .dot {
      left: 29px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 10px;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Load Watcher</div>
    <div class="row">
      <div id="statusText" class="status">Loading...</div>
      <div id="toggle" class="switch"><div class="dot"></div></div>
    </div>
    <button id="manualPollBtn">Hozir tekshirish</button>
    <button id="resetBtn">Seen reset</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
